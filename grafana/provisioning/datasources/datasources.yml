apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      timeInterval: "15s" # should match Prometheus scrape_interval

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      # Correlate Loki logs with Prometheus metrics via the service_name label.
      # In Grafana's Explore view this lets you jump from a log stream directly to the related metrics.
      derivedFields:
        - name: service_name
          matcherRegex: ""
          url: ""
