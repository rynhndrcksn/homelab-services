global:
  scrape_interval: 15s      # how often to scrape targets
  evaluation_interval: 15s  # how often to evaluate alerting rules

scrape_configs:

  # Prometheus scrapes itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OS-level metrics from Node Exporter
  - job_name: "node-exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"

  # Docker container metrics from cAdvisor
  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "cadvisor:8080"

  # Grafana exposes its own metrics
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
